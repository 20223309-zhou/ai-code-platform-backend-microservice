spring:
  #RabbitMQ配置
  rabbitmq:
    host: ${RABBITMQ_URL} # 你的虚拟机IP
    port: ${RABBITMQ_PORT} # 端口
    virtual-host: ${RABBITMQ_VIRTUAL_HOST} # 虚拟主机
    username: ${RABBITMQ_USUER_NAME} # 用户名
    password: ${RABBITMQ_PASSWORD} # 密码

# 添加 COS 对象存储配置（需要从腾讯云获取）
cos:
  client:
    host: ${COS_HOST}
    secretId: ${COS_SECRET_ID}
    secretKey: ${COS_SECRET_KEY}
    region: ${COS_REGION}
    bucket: ${COS_BUCKET}

# Dubbo
dubbo:
  application:
    qos-enable: false
  registry:
    address: nacos://${NACOS_URL}:${NACOS_PORT:8848}?username=nacos&password=nacos
    register-mode: instance
  protocol:
    name: tri
    port: 50052
  consumer:
    timeout: 120000
  provider:
    timeout: 120000

