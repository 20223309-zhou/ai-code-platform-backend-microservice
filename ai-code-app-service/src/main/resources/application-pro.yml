spring:
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${SPRING_MYSQL_URL}:${SPRING_MYSQL_PORT}/ai_code_platform?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8
    username: root
    password: ${SPRING_MYSQL_PASSWORD}
  # redis
  data:
    redis:
      username: default
      ttl: 3600
      database: 0
      host: ${SPRING_REDIS_URL}
      port: ${SPRING_REDIS_PORT}
      password: ${SPRING_REDIS_PASSWORD}
      timeout: 5000
# AI
langchain4j:
  open-ai:
    # 推理 AI 模型配置（用于复杂的推理任务）
    reasoning-streaming-chat-model:
      base-url: ${AI_BASE_URL}
      api-key: ${AI_API_KEY}
      model-name: ${AI_MODEL_NAME}
      max-tokens: 62768
      temperature: 0.7
      log-requests: false
      log-responses: true
    # 智能路由 AI 模型配置（用于简单的分类任务）
    routing-chat-model:
      base-url: ${ROUTING_AI_BASE_URL}
      api-key: ${ROUTING_AI_API_KEY}
      model-name: ${ROUTING_AI_MODEL_NAME}
      max-tokens: 100
      temperature: 0.7
      log-requests: false
      log-responses: false
    chat-model:
      # 严格确保结构化输出生效
      #      strict-json-schema: true
      #      response-format: json_object
      max-tokens: 8192
      base-url: ${AI_BASE_URL}
      api-key: ${AI_API_KEY}
      model-name: ${AI_MODEL_NAME}
      log-requests: false
      log-responses: false
      timeout: PT120S
    streaming-chat-model:
      max-tokens: 8192
      base-url: ${AI_BASE_URL}
      api-key: ${AI_API_KEY}
      model-name: ${AI_MODEL_NAME}
      log-requests: false
      log-responses: true
      timeout: PT120S
# Dubbo
dubbo:
  application:
    qos-enable: false
  registry:
    address: nacos://${NACOS_URL}:${NACOS_PORT:8848}?username=nacos&password=nacos
    register-mode: instance
  protocol:
    name: tri
    port: 50053
  consumer:
    timeout: 120000
  provider:
    timeout: 120000

#部署路径
code:
  deploy-path: http://www.icodeplay.site/dist

cos:
  client:
    host: ${COS_HOST}
    secretId: ${COS_SECRET_ID}
    secretKey: ${COS_SECRET_KEY}
    region: ${COS_REGION}
    bucket: ${COS_BUCKET}
# Qdrant 向量数据库配置
qdrant:
  host: ${QDRANT_URL}
  port: ${QDRANT_PORT}
  collection-name: code_embeddings
  vector-size: 512  # BGE-Small-ZH-V1.5 的向量维度
  distance-type: Cosine
